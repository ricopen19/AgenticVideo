- id: 1
  character: metan
  text: 今回は『不等式を満たす整数 $x$ がちょうど6個存在するような $a$ の値の範囲』を考えていくわよ。まずは準備として、大元の不等式①を解くところから始めましょうか。
  scene: 1
  pauseAfter: 6
- id: 2
  character: zundamon
  text: よっしゃ！ まかせるのだ！
  scene: 1
  pauseAfter: 6
- id: 3
  character: metan
  text: 問題の不等式はこれね。$a$ は正の定数よ。
  scene: 1
  pauseAfter: 6
  visuals:

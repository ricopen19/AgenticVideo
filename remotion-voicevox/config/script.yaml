      fontSize: 64
      animation: none
    - type: text
      text: $$-a \leqq 2x - 3 \leqq a$$
      fontSize: 64
      animation: fadeIn
- id: 5
  character: metan
  text: その通り！ じゃあ、真ん中を $x$ だけにするために、順番に変形していってちょうだい。
  scene: 1

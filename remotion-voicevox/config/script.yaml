      text: $$|2x - 3| \leqq a$$
      fontSize: 64
      animation: fadeIn
- id: 4
  character: zundamon
  text: 絶対値の不等式なのだ！ $|X| \leqq a$ の形は、$-a \leqq X \leqq a$ になるって習ったのだ。だから、こうやって外すのだ！
  scene: 1
  pauseAfter: 6
  visuals:
    - type: text

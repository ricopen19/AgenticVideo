  text: やってみるのだ！ 左端の $\frac{3 - a}{2}$ と右端の $\frac{3 + a}{2}$ を足すと…… $a$ が消えて $\frac{6}{2} = 3$ になるのだ。それをさらに $2$ で割るから、中心は $1.5$ なのだ！
